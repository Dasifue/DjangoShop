{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container-fluid">
    <div class="contact-form bg-light p-30">
        <form method="post" action="{% url 'account:reset_password' %}">
            {% csrf_token %}
            <div class="control-group">
                <input type="password" class="form-control" id="password" placeholder="Old password" name="password"
                    required="required" data-validation-required-message="Enter password" />
                <p class="help-block text-danger"> {% if password %}{{password}} {% endif %}</p>
            </div>
            <div class="control-group">
                <input type="password" class="form-control" id="password" placeholder="New password" name="new_password"
                    required="required" data-validation-required-message="Enter password" />
                <p class="help-block text-danger">{{form.new_password.errors}}</p>
            </div>
            <h3>{{error}}</h3>
            <div>
                <input type="submit" class="btn btn-primary py-2 px-4" value="Reset password">
            </div>
        </form>
    </div>  
</div> 

{% endblock %}
